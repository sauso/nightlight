## Nightlight baby monitor — SWAG reverse proxy config
##
## Save this as: swag/config/nginx/proxy-confs/nightlight.subdomain.conf
##
## Before use:
##   1. Replace UNRAID_LAN_IP below with your Unraid box's actual LAN IP
##      (e.g. 192.168.1.50). Container-name resolution (like "app:4000") does
##      NOT work here — the app stack uses network_mode: host, so it isn't on
##      the same Docker network as SWAG, only reachable via the host's real IP.
##   2. Make sure "nightlight" resolves to your SWAG box, either in your own
##      DNS or via SWAG's usual DNS validation setup for the subdomain.
##
## This proxies the app, login, all camera management pages, and BOTH video modes:
## - "Compatibility" mode (HLS) is pure HTTP/TCP and works entirely through this proxy
##   with no other setup needed.
## - "Low latency" mode (WebRTC) has its signaling proxied here too, but the actual
##   audio/video always travels over UDP directly between the browser and MediaMTX —
##   that part never goes through this proxy. For that to work from outside your LAN,
##   set PUBLIC_HOST in the app's .env and forward UDP port 8189 on your router — see
##   the main README's "Remote / internet access" section.

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name nightlight.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app UNRAID_LAN_IP;
        set $upstream_port 4000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
