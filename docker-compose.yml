services:
  nightlight:
    image: sauso/nightlight:latest
    # Uncomment to build from source instead of pulling from Docker Hub:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: nightlight
    restart: unless-stopped
    network_mode: host
    environment:
      # Which host user/group owns files this container creates in the data volume
      # (database, logs, MediaMTX config) - matters because Docker otherwise runs the
      # app as root, leaving everything root-owned and awkward to manage from outside
      # the container. Defaults to 99/100 - Unraid's own "nobody"/"users" convention.
      # Find your own with `id your_username` if you want something else.
      - PUID=${PUID:-99}
      - PGID=${PGID:-100}
      # Your local timezone (e.g. Australia/Melbourne) - affects log timestamps only.
      # Defaults to UTC if unset. Full list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
      - TZ=${TZ:-UTC}
      # Optional. A random, persistent secret is auto-generated and stored in the
      # data volume on first run if this is left unset - only set this yourself if
      # you specifically want a fixed value (e.g. shared across a migration).
      - JWT_SECRET=${JWT_SECRET:-}
      # Your public IP or DDNS hostname - only needed for Low Latency (WebRTC) mode
      # to work from outside your home network. Leave unset for LAN-only use.
      - PUBLIC_HOST=${PUBLIC_HOST:-}
    volumes:
      # Defaults to ./data next to this file. On Unraid, set APPDATA_DIR in .env to
      # something like /mnt/user/appdata/nightlight so it shows up in the Unraid UI/backups.
      - ${APPDATA_DIR:-./data}:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
